<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario - Estilo Facebook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fb: {
              azul: '#1877F2',
              gris: '#F0F2F5',
              texto: '#1C1E21',
              borde: '#E5E7EB'
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
@layer utilities {
.content-auto { 
content-visibility: auto;
}
.scrollbar-thin { 
scrollbar-width: thin; 
}

.scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
}
    
header {
	width: 100%;
	height: 50px;
	align-content: center;
	align-items: center;
	justify-content: center;
}

.display {
	width: 96%;
	margin-inline: 2%;
	height: 40px;
	margin-block: 5px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}

h1 {
	word-spacing: -2px;
	letter-spacing: -1px;
}
  </style>
</head>
<body class="bg-gray-100">
<header class="bg-gray-100 border-b sticky top-0 z-50 shadow-sm">
<div class="display justify-between">
<h1 class="text-[1.5em] text-blue-600 text-bold"><b>falcebook</b></h1>
<i class="fa fa-home text-gray-500 text-[1.6em]"></i>
<i class="fa fa-image text-gray-500 text-[1.4em]"></i>
<i class="fa fa-user-plus text-gray-500 text-[1.4em]"></i>
<i class="fa fa-search text-gray-500 text-[1.4em]"></i>
<i class="fa fa-ellipsis-v text-gray-500 text-[1.4em]"></i></div></header>
<div class="max-w-6xl mx-auto px-2 py-0">
<div class="bg-white rounded-lg shadow mb-4 overflow-hidden">
<div class="relative h-40 bg-gray-200">
<img id="coverImg" src="https://i.postimg.cc/1R24CkQM/7f6f770596eedf0ecd2dfc2e071aa7ec.webp" alt="Portada" class="w-full h-full object-cover">
<label for="coverInput" class="opacity-10 absolute bottom-2 right-2 bg-white p-1 rounded-full shadow cursor-pointer hover:bg-gray-100">
<i class="fa fa-camera text-[1em]"></i>
<input type="file" id="coverInput" accept="image/*" class="hidden"></label></div>
    <!-- Foto de perfil y datos -->
<div class="flex gap-2 mt-0 relative">
<div class="relative -mt-20 ml-2">
<img id="profileImg" src="https://i.postimg.cc/R0S7p8tC/2eede2b88e8de73dd95191e3ffb0a176.webp" alt="Perfil" class="w-40 h-40 rounded-full border-4 border-gray-100 shadow-lg object-cover">
<label for="profileInput" class="absolute bottom-4 right-4 bg-blue-500 p-2 rounded-full cursor-pointer hover:bg-blue-500">
<i class="fa fa-check text-white text-[0.6em]"></i>
<input type="file" id="profileInput" accept="image/*" class="hidden">      </label></div>
<div class="text-center ml-2 mt-2">
<h1 class="text-[1.3em]"><b>Don Smaily Chickles</b></h1>
<p class="text-gray-500 text-[0.8em]"><i class="fa fa-users"></i> 1000m de seguidores</p></div></div>
<div class="border-t border-fb-borde mt-4">
<nav class="flex gap-1 px-4 overflow-x-auto">
<button class="tab-btn px-6 py-3 font-medium text-fb-azul border-b-2 border-fb-azul" data-tab="publicaciones">Publicaciones</button>
<button class="tab-btn px-6 py-3 font-medium text-gray-600 hover:bg-gray-100 rounded-t" data-tab="fotos">Fotos</button>
<button class="tab-btn px-6 py-3 font-medium text-gray-600 hover:bg-gray-100 rounded-t" data-tab="amigos">Amigos</button>
      </nav>
    </div>
  </div>
  <!-- Contenido de pestañas -->
  <div id="tabContent">
    <!-- Pestaña Publicaciones -->
    <div id="publicaciones" class="tab-panel block">
      <!-- Formulario para crear publicación -->
      <div class="bg-white p-4 rounded-lg shadow mb-4">
        <textarea id="postContent" placeholder="¿Qué estás pensando?" class="w-full p-3 border border-fb-borde rounded-lg resize-none focus:outline-none focus:ring-1 focus:ring-fb-azul h-20"></textarea>
        <div class="flex justify-between items-center mt-3 pt-3 border-t border-fb-borde">
          <div class="flex gap-3">
            <label for="postMedia" class="flex items-center gap-4 cursor-pointer text-gray-600 hover:text-fb-azul">
              <i class="fa fa-photo text-xl"></i> Foto<i class="fa fa-camera"></i>Video</label>
            <input type="file" id="postMedia" accept="image/*,video/*" class="hidden">
            <span id="mediaPreviewText" class="text-sm text-gray-500 italic"></span></div>
          <button id="publishBtn" class="bg-fb-azul text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-600">Publicar</button>
        </div>
      </div>

      <!-- Lista de publicaciones -->
      <div id="postsContainer" class="space-y-4"></div>
    </div>

    <!-- Pestaña Fotos -->
    <div id="fotos" class="tab-panel hidden">
      <div class="bg-white p-4 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Todas las fotos y videos</h3>
        <div id="mediaGallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
      </div>
    </div>

    <!-- Pestaña Amigos -->
    <div id="amigos" class="tab-panel hidden">
      <div class="bg-white p-4 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Amigos</h3>
        <p class="text-gray-600">Lista de amigos se puede ampliar fácilmente conectando a la base de datos.</p>
      </div>
    </div>
  </div>

</div>

<script>
  // --- CONFIGURACIÓN SUPABASE ---
  const SUPABASE_URL = "https://fnjnpcmwqmnotfnnfqme.supabase.co/rest/v1/";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZuam5wY213cW1ub3Rmbm5mcW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxODc0OTgsImV4cCI6MjA5Nzc2MzQ5OH0.WpXYNZr9cr1fteSF3eV_qVctK7LwOeGZ0uk1KZ-4LjQ";
  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

  // --- ELEMENTOS DEL DOM ---
  const tabButtons = document.querySelectorAll('.tab-btn');
  const tabPanels = document.querySelectorAll('.tab-panel');
  const profileImg = document.getElementById('profileImg');
  const coverImg = document.getElementById('coverImg');
  const profileInput = document.getElementById('profileInput');
  const coverInput = document.getElementById('coverInput');
  const postContent = document.getElementById('postContent');
  const postMedia = document.getElementById('postMedia');
  const mediaPreviewText = document.getElementById('mediaPreviewText');
  const publishBtn = document.getElementById('publishBtn');
  const postsContainer = document.getElementById('postsContainer');
  const mediaGallery = document.getElementById('mediaGallery');

  // --- CARGAR DATOS AL INICIAR ---
  window.addEventListener('load', async () => {
    await loadProfile();
    await loadPosts();
  });

  // --- FUNCIONES DE PERFIL ---
  async function loadProfile() {
    const { data } = await supabase.from('profile_settings').select('*').eq('id', 1).single();
    if (data) {
      profileImg.src = data.profile_pic_url;
      coverImg.src = data.cover_pic_url;
    }
  }

  async function uploadFile(file, folder) {
    const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
    const { data, error } = await supabase.storage.from('media').upload(`${folder}/${fileName}`, file);
    if (error) throw error;
    const { data: urlData } = supabase.storage.from('media').getPublicUrl(`${folder}/${fileName}`);
    return urlData.publicUrl;
  }

  profileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = await uploadFile(file, 'profile');
    await supabase.from('profile_settings').update({ profile_pic_url: url }).eq('id', 1);
    profileImg.src = url;
  });

  coverInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = await uploadFile(file, 'cover');
    await supabase.from('profile_settings').update({ cover_pic_url: url }).eq('id', 1);
    coverImg.src = url;
  });

  // --- FUNCIONES DE PESTAÑAS ---
  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('text-fb-azul', 'border-b-2', 'border-fb-azul'));
      tabButtons.forEach(b => b.classList.add('text-gray-600'));
      btn.classList.add('text-fb-azul', 'border-b-2', 'border-fb-azul');
      btn.classList.remove('text-gray-600');

      tabPanels.forEach(panel => panel.classList.add('hidden'));
      document.getElementById(btn.dataset.tab).classList.remove('hidden');
      if (btn.dataset.tab === 'fotos') loadGallery();
    });
  });

  // --- CREAR PUBLICACIÓN ---
  postMedia.addEventListener('change', () => {
    const file = postMedia.files[0];
    mediaPreviewText.textContent = file ? `Archivo seleccionado: ${file.name}` : '';
  });

  publishBtn.addEventListener('click', async () => {
    const texto = postContent.value.trim();
    const file = postMedia.files[0];
    if (!texto && !file) return alert('Escribe algo o agrega un archivo');

    let mediaUrl = null;
    let mediaType = null;

    if (file) {
      mediaUrl = await uploadFile(file, 'posts');
      mediaType = file.type.startsWith('image/') ? 'image' : 'video';
    }

    await supabase.from('posts').insert({ content: texto, media_url: mediaUrl, media_type: mediaType });
    postContent.value = '';
    postMedia.value = '';
    mediaPreviewText.textContent = '';
    await loadPosts();
  });

  // --- CARGAR PUBLICACIONES ---
  async function loadPosts() {
    const { data: posts } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
    postsContainer.innerHTML = '';

    for (const post of posts) {
      const { data: likes } = await supabase.from('likes').select('id').eq('post_id', post.id);
      const { data: comments } = await supabase.from('comments').select('*').eq('post_id', post.id).order('created_at', { ascending: true });

      const postEl = document.createElement('div');
      postEl.className = 'bg-white p-4 rounded-lg shadow';
      postEl.innerHTML = `
        <div class="flex items-center gap-3 mb-3">
          <img src="${profileImg.src}" class="w-10 h-10 rounded-full object-cover">
          <div>
            <h4 class="font-semibold">Usuario Ejemplo</h4>
            <p class="text-xs text-gray-500">${new Date(post.created_at).toLocaleString()}</p>
          </div>
        </div>
        ${post.content ? `<p class="mb-3">${post.content}</p>` : ''}
        ${post.media_url ? `
          <div class="mb-3 rounded overflow-hidden">
            ${post.media_type === 'image' 
              ? `<img src="${post.media_url}" class="w-full max-h-96 object-contain">` 
              : `<video src="${post.media_url}" controls class="w-full max-h-96"></video>`}
          </div>
        ` : ''}
        <div class="flex gap-6 border-t border-b py-2 my-2 text-gray-600">
          <button class="like-btn flex items-center gap-2" data-post="${post.id}">
            <i class="fa fa-thumbs-up"></i> Me gusta (${likes.length})
          </button>
          <button class="comment-toggle flex items-center gap-2">
            <i class="fa fa-comment"></i> Comentar (${comments.length})
          </button>
        </div>
        <div class="comments-section hidden mt-3">
          <div class="space-y-3 mb-3">
            ${comments.map(c => `<div class="bg-gray-50 p-2 rounded"><span class="font-medium">${c.author_name}:</span> ${c.content}</div>`).join('')}
          </div>
          <div class="flex gap-2">
            <input type="text" class="comment-input flex-1 border rounded px-2 py-1" placeholder="Escribe un comentario...">
            <button class="send-comment bg-fb-azul text-white px-3 py-1 rounded" data-post="${post.id}">Enviar</button>
          </div>
        </div>
      `;
      postsContainer.appendChild(postEl);
    }

    addPostEvents();
  }

  // --- EVENTOS DE PUBLICACIONES ---
  function addPostEvents() {
    document.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const postId = btn.dataset.post;
        await supabase.from('likes').insert({ post_id: postId });
        loadPosts();
      });
    });

    document.querySelectorAll('.comment-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.parentElement.nextElementSibling;
        section.classList.toggle('hidden');
      });
    });

    document.querySelectorAll('.send-comment').forEach(btn => {
      btn.addEventListener('click', async () => {
        const postId = btn.dataset.post;
        const input = btn.previousElementSibling;
        const texto = input.value.trim();
        if (!texto) return;
        await supabase.from('comments').insert({ post_id: postId, content: texto });
        input.value = '';
        loadPosts();
      });
    });
  }

  // --- CARGAR GALERÍA DE FOTOS ---
  async function loadGallery() {
    const { data: posts } = await supabase.from('posts').select('media_url, media_type').not('media_url', 'is', null);
    mediaGallery.innerHTML = '';
    posts.forEach(item => {
      const el = document.createElement('div');
      el.className = 'aspect-square rounded overflow-hidden bg-gray-100';
      el.innerHTML = item.media_type === 'image' 
        ? `<img src="${item.media_url}" class="w-full h-full object-cover">` 
        : `<video src="${item.media_url}" class="w-full h-full object-cover" muted></video>`;
      mediaGallery.appendChild(el);
    });
  }
</script>

</body>
</html>
