<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Smaily Chickles • Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Poppins:wght@500;600&amp;display=swap');
        
:root {
--primary: #1877f2;
}
        
body {
font-family: 'Inter', system_ui, sans-serif;
}
        
.facebook-font {
font-family: 'Poppins', 'Inter', system_ui, sans-serif;
}

.profile-cover {
background-size: cover;
background-position: center;
transition: all 0.3s ease;
}

.profile-pic {
transition: all 0.3s ease;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
}

.post-card {
transition: all 0.2s ease;
}

.nav-tab {
transition: all 0.2s ease;
}

.nav {
	width: 100%;
	margin: 0px;
	padding: 0px;
	align-content: center;
	justify-content: center;
}

.nav-tab.active {
border-bottom: 3px solid #1877f2;
color: #1877f2;
font-weight: 600;
}

.media-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 8px;
}

.post-media {
max-height: 410px;
object-fit: cover;
border-radius: 12px;
        }

.interaction-btn {
transition: all 0.1s ease;
}

.interaction-btn:hover {
background-color: #f0f2f5;
}

.section-header {
font-weight: 700;
letter-spacing: -0.25em;
}

.display {
	width: 96%;
	margin-inline: 2%;
	display: flex;
	align-content: center;
	justify-content: space-between;
}

.bam {
	width: 100%;
	height: auto;
	display: flex;
	align-content: center;
	justify-content: center;
}

.adr {
	width: 250px;
	height: 70px;
	margin-left: 5px;
	margin-top: 5px;
	align-content: center;
	text-align: center;
	align-items: center;
	justify-content: center;
}

h1 {
	margin-top: 5px;
	word-spacing: -2px;
	letter-spacing: -2px;
}

.ref {
	margin-top: -30px;
}
</style>
</head>
<body class="bg-[#f0f2f5]">
<nav class="bg-white border-b-4 border-gray-500 shadow-sm sticky top-0 z-50">
<div class="display flex items-center justify-between h-10">
<h1 class="text-[1.2em] text-blue-600 text-bold"><b>falcebook</b></h1>
<i class="fa-solid fa-house text-[0.9em] text-gray-500"></i>
<i class="fa-solid fa-image text-gray-500 text-[0.9em]"></i>
<i class="fa-solid fa-user-plus text-gray-500 text-[0.9em]"></i>
<i class="fa-solid fa-message text-gray-500 text-[0.9em]"></i>
<i class="fa-solid fa-search text-gray-500 text-[0.9em]"></i>
<i class="fa-solid fa-ellipsis-h text-gray-500 text-[0.9em]"></i>
</div></nav>
<div class="max-w-6xl mx-auto px-1 pt-0">
<!-- Profile Header -->
<div class="bg-gray-100 rounded-lg shadow overflow-hidden">
<!-- Cover Photo -->
<div id="cover-photo" class="profile-cover h-40 w-full relative cursor-pointer" style="background-image: url('https://i.postimg.cc/h4bPtfNz/d212ef16fc7a358b9fc396c10e726270.webp')">
<div class="opacity-20 absolute bottom-1 right-1">
<label class="bg-white hover:bg-gray-100 transition-colors px-1 py-1 rounded-full flex items-center cursor-pointer shadow text-sm font-medium">
<i class="fa-solid fa-camera"></i>
<input type="file" id="cover-input" accept="image/*" class="hidden" onchange="changeCoverPhoto(event)"></label></div></div></div>
<!-- Profile Info -->
<div class="bam flex">
<!-- Profile Picture -->
<div class="ref relative">
<img id="profile-pic" src="https://i.postimg.cc/gj3KxydB/1000175238.jpg" class="profile-pic w-32 h-32 rounded-full border-4 border-white object-cover cursor-pointer" onclick="document.getElementById('profile-input').click()">
<label class="absolute bottom-3 right-3 bg-white p-2 rounded-full shadow cursor-pointer hover:bg-gray-100">
<i class="fa-solid fa-camera text-gray-700"></i>
<input type="file" id="profile-input" accept="image/*" class="hidden" onchange="changeProfilePhoto(event)">
</label></div>
<div class="adr relative">
<h1 class="text-[1.4em] font-bold text-center"><b>Don Smaily Chickles</b></h1>
<i class="fa-solid fa-users text-[0.7em] text-gray-500 text-center mt-1">&ensp;1000m de seguidores</i></div></div>
<!-- Tabs -->
<div class="mt-2 w-full justify-between bg-white rounded-xl shadow flex border-b">
<div onclick="switchTab('profile')" id="tab-profile" class="nav-tab active flex-1 px-1 py-2 flex items-center justify-center gap-x-1 cursor-pointer font-medium text-gray-700">
<i class="fa-solid fa-user text-[0.9em]"></i>
<span class="text-[0.9em]"><b>PERFIL</b></span>
</div>
<div onclick="switchTab('photos')" id="tab-photos" class="nav-tab flex-1 px-1 py-2 flex items-center justify-center gap-x-1 cursor-pointer font-medium text-gray-700">
<i class="fa-solid fa-images text-[0.9em]"></i>
<span class="text-[0.9em]"><b>FOTOS</b></span></div>
<div onclick="switchTab('friends')" id="tab-friends" class="nav-tab flex-1 px-1 py-2 flex items-center justify-center gap-x-1 cursor-pointer font-medium text-gray-700">
<i class="fa-solid fa-users text-[0.9em]"></i>
<span class="text-[0.9em]"><b>AMIGOS</b></span></div></div>
<!-- Content Area -->
<div class="mt-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
<!-- Main Content -->
<div class="lg:col-span-8">
<!-- Composer -->
<div id="composer-section" class="bg-white rounded-xl shadow p-4 mb-4">
<div class="flex gap-x-3">
<img id="composer-profile-pic" src="https://i.postimg.cc/gj3KxydB/1000175238.jpg" class="w-10 h-10 rounded-full object-cover">
<div class="flex-1">
<textarea id="post-text" rows="3" placeholder="¡Publica una pendeja pendejada!" class="w-full resize-none border border-gray-200 focus:border-[#1877f2] rounded-2xl px-2 py-2 text-sm"></textarea>
<div class="flex items-center justify-between mt-3">
<div class="flex gap-x-1">
<label class="flex items-center gap-x-2 px-4 py-2 hover:bg-gray-100 rounded-full cursor-pointer text-sm">
<i class="fa-solid fa-image text-green-500"></i>
<span class="font-medium">Foto</span>
<input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="handleMediaUpload(event, 'photo')"></label>
<label class="flex items-center gap-x-2 px-4 py-2 hover:bg-gray-100 rounded-full cursor-pointer text-sm">
<i class="fa-solid fa-video text-red-500"></i>
<span class="font-medium">Video</span>
<input type="file" id="video-upload" accept="video/*" class="hidden" onchange="handleMediaUpload(event, 'video')">
</label></div>
<button onclick="createPost()" class="bg-[#1877f2] hover:bg-[#166fe0] transition-colors px-6 py-2 rounded-full text-white font-semibold text-sm">Publicar</button></div>
<!-- Media Preview -->
<div id="media-preview" class="hidden mt-3">
<div class="relative inline-block">
<img id="preview-image" class="max-h-48 rounded-xl hidden">
<video id="preview-video" class="max-h-48 rounded-xl hidden" controls></video>
<button onclick="removeMediaPreview()" class="absolute -top-2 -right-2 bg-gray-800 text-white w-6 h-6 rounded-full flex items-center justify-center">
<i class="fa-solid fa-times text-xs"></i></button></div></div></div></div></div>
<!-- Posts Feed -->
<div id="posts-feed">
<!-- Posts will be dynamically inserted here -->
</div></div>
<!-- Sidebar -->
<div class="bg-white rounded-xl shadow p-5">
<h3 class="font-semibold mb-3">Sobre mí</h3>
<p id="bio-text" class="text-sm text-gray-600">Creador de contenido y desarrollador web. Apasionado por la tecnología, el diseño y compartir conocimiento.</p>
<div class="mt-4 pt-4 border-t text-sm">
<div class="flex justify-between py-1">
<span class="text-gray-500">Ubicación</span>
<span class="font-medium">Ciudad de México</span>
</div>
<div class="flex justify-between py-1">
<span class="text-gray-500">Se unió</span>
<span class="font-medium">Enero 2021</span></div></div></div></div></div></div>

    <!-- Comments Modal -->
    <div id="comments-modal" onclick="if (event.target.id === 'comments-modal') closeCommentsModal()" 
         class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full max-w-lg rounded-2xl max-h-[80vh] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-semibold">Comentarios</h3>
                <button onclick="closeCommentsModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            <div id="comments-list" class="flex-1 overflow-auto p-4 space-y-4"></div>
            <div class="p-4 border-t">
                <div class="flex gap-x-2">
                    <input id="comment-input" type="text" placeholder="Escribe un comentario..." 
                           class="flex-1 border rounded-full px-4 py-2 text-sm">
                    <button onclick="addComment()" class="bg-[#1877f2] text-white px-5 rounded-full text-sm font-medium">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tailwind script
        function initializeTailwind() {
            document.documentElement.style.setProperty('--accent', '#1877f2');
        }

        // Data storage
        let posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
        let currentMedia = null;
        let currentPostId = null;

        // Load saved profile images
        function loadProfileImages() {
            const profilePic = localStorage.getItem('profilePic');
            const coverPic = localStorage.getItem('coverPic');
            
            if (profilePic) {
                document.getElementById('profile-pic').src = profilePic;
                document.getElementById('composer-profile-pic').src = profilePic;
                document.getElementById('nav-profile-pic').src = profilePic;
            }
            
            if (coverPic) {
                document.getElementById('cover-photo').style.backgroundImage = `url(${coverPic})`;
            }
        }

        function changeProfilePhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                document.getElementById('profile-pic').src = imgData;
                document.getElementById('composer-profile-pic').src = imgData;
                document.getElementById('nav-profile-pic').src = imgData;
                localStorage.setItem('profilePic', imgData);
            };
            reader.readAsDataURL(file);
        }

        function changeCoverPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                document.getElementById('cover-photo').style.backgroundImage = `url(${imgData})`;
                localStorage.setItem('coverPic', imgData);
            };
            reader.readAsDataURL(file);
        }

        function editBio() {
            const bioElement = document.getElementById('bio-text');
            const currentBio = bioElement.textContent;
            
            const newBio = prompt("Edita tu biografía:", currentBio);
            if (newBio !== null) {
                bioElement.textContent = newBio;
                localStorage.setItem('userBio', newBio);
            }
        }

        function switchTab(tab) {
            // Hide all sections
            document.getElementById('composer-section').style.display = 'block';
            document.getElementById('posts-feed').style.display = 'block';
            
            // Reset active tabs
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            
            if (tab === 'profile') {
                document.getElementById('tab-profile').classList.add('active');
                document.getElementById('posts-feed').style.display = 'block';
            } 
            else if (tab === 'photos') {
                document.getElementById('tab-photos').classList.add('active');
                document.getElementById('composer-section').style.display = 'none';
                showPhotosTab();
            } 
            else if (tab === 'friends') {
                document.getElementById('tab-friends').classList.add('active');
                document.getElementById('composer-section').style.display = 'none';
                showFriendsTab();
            }
        }

        function showPhotosTab() {
            const feed = document.getElementById('posts-feed');
            feed.innerHTML = `
                <div class="bg-white rounded-xl shadow p-5">
                    <h3 class="font-semibold mb-4">Todas las fotos y videos</h3>
                    <div class="media-grid" id="photos-grid"></div>
                </div>
            `;
            
            const grid = document.getElementById('photos-grid');
            const mediaPosts = posts.filter(p => p.media);
            
            if (mediaPosts.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 col-span-full">Aún no hay multimedia.</p>`;
                return;
            }
            
            mediaPosts.forEach(post => {
                const div = document.createElement('div');
                div.className = 'aspect-square overflow-hidden rounded-xl cursor-pointer';
                
                if (post.mediaType === 'photo') {
                    div.innerHTML = `<img src="${post.media}" class="w-full h-full object-cover hover:scale-105 transition-transform">`;
                } else {
                    div.innerHTML = `
                        <div class="relative w-full h-full bg-black flex items-center justify-center">
                            <video class="w-full h-full object-cover">
                                <source src="${post.media}">
                            </video>
                            <i class="fa-solid fa-play absolute text-white text-3xl opacity-80"></i>
                        </div>
                    `;
                }
                
                div.onclick = () => {
                    window.open(post.media, '_blank');
                };
                
                grid.appendChild(div);
            });
        }

        function showFriendsTab() {
            const feed = document.getElementById('posts-feed');
            feed.innerHTML = `
                <div class="bg-white rounded-xl shadow p-5">
                    <h3 class="font-semibold mb-4">Amigos (248)</h3>
                    <div class="grid grid-cols-3 gap-3">
                        ${Array(9).fill().map(() => `
                            <div class="flex items-center gap-x-3 p-2 hover:bg-gray-50 rounded-xl">
                                <img src="https://picsum.photos/id/${Math.floor(Math.random()*50)}/40/40" class="w-10 h-10 rounded-full">
                                <div>
                                    <p class="font-medium text-sm">Usuario Ejemplo</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleMediaUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentMedia = {
                    data: e.target.result,
                    type: type
                };
                
                const previewContainer = document.getElementById('media-preview');
                const previewImage = document.getElementById('preview-image');
                const previewVideo = document.getElementById('preview-video');
                
                previewContainer.classList.remove('hidden');
                
                if (type === 'photo') {
                    previewImage.src = currentMedia.data;
                    previewImage.classList.remove('hidden');
                    previewVideo.classList.add('hidden');
                } else {
                    previewVideo.src = currentMedia.data;
                    previewVideo.classList.remove('hidden');
                    previewImage.classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function removeMediaPreview() {
            document.getElementById('media-preview').classList.add('hidden');
            currentMedia = null;
            document.getElementById('photo-upload').value = '';
            document.getElementById('video-upload').value = '';
        }

        function createPost() {
            const text = document.getElementById('post-text').value.trim();
            
            if (!text && !currentMedia) {
                alert("Escribe algo o agrega una foto/video");
                return;
            }
            
            const newPost = {
                id: Date.now(),
                text: text,
                media: currentMedia ? currentMedia.data : null,
                mediaType: currentMedia ? currentMedia.type : null,
                timestamp: new Date().toISOString(),
                likes: 0,
                liked: false,
                comments: []
            };
            
            posts.unshift(newPost);
            savePosts();
            
            // Reset composer
            document.getElementById('post-text').value = '';
            removeMediaPreview();
            
            renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('posts-feed');
            container.innerHTML = '';
            
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl shadow p-8 text-center">
                        <p class="text-gray-500">Aún no hay publicaciones. ¡Crea la primera!</p>
                    </div>
                `;
                return;
            }
            
            posts.forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = `post-card bg-white rounded-xl shadow mb-4 overflow-hidden`;
                
                let mediaHTML = '';
                if (post.media) {
                    if (post.mediaType === 'photo') {
                        mediaHTML = `<img src="${post.media}" class="w-full post-media mt-2">`;
                    } else {
                        mediaHTML = `
                            <video controls class="w-full post-media mt-2">
                                <source src="${post.media}">
                            </video>
                        `;
                    }
                }
                
                const date = new Date(post.timestamp).toLocaleDateString('es-ES', {
                    day: 'numeric', month: 'short'
                });
                
                postEl.innerHTML = `
                    <div class="p-4">
                        <div class="flex items-center gap-x-3">
                            <img src="${document.getElementById('profile-pic').src}" class="w-10 h-10 rounded-full">
                            <div>
                                <p class="font-semibold">Don Smaily Chickles</p>
                                <p class="text-xs text-gray-500">${date}</p>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <p class="text-[15px]">${post.text}</p>
                            ${mediaHTML}
                        </div>
                        
                        <div class="flex justify-between items-center mt-4 pt-3 border-t text-sm">
                            <div class="flex items-center gap-x-1">
                                <button onclick="likePost(${post.id}, this)" 
                                        class="interaction-btn flex items-center gap-x-1.5 px-3 py-1.5 rounded-full ${post.liked ? 'text-[#1877f2]' : 'text-gray-600'}">
                                    <i class="fa-solid fa-thumbs-up"></i>
                                    <span>${post.likes}</span>
                                </button>
                            </div>
                            
                            <div class="flex gap-x-4 text-gray-600">
                                <button onclick="showComments(${post.id})" class="interaction-btn px-3 py-1.5 rounded-full flex items-center gap-x-1.5">
                                    <i class="fa-solid fa-comment"></i>
                                    <span>${post.comments.length}</span>
                                </button>
                                
                                <button onclick="sharePost(${post.id})" class="interaction-btn px-3 py-1.5 rounded-full flex items-center gap-x-1.5">
                                    <i class="fa-solid fa-share"></i>
                                    <span>Compartir</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                container.appendChild(postEl);
            });
        }

        function likePost(postId, element) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (!post.liked) {
                post.likes++;
                post.liked = true;
                element.classList.add('text-[#1877f2]');
            } else {
                post.likes--;
                post.liked = false;
                element.classList.remove('text-[#1877f2]');
            }
            
            element.querySelector('span').textContent = post.likes;
            savePosts();
        }

        function showComments(postId) {
            currentPostId = postId;
            const modal = document.getElementById('comments-modal');
            const list = document.getElementById('comments-list');
            const post = posts.find(p => p.id === postId);
            
            list.innerHTML = '';
            
            if (post.comments.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-400 py-4">Sé el primero en comentar</p>`;
            } else {
                post.comments.forEach(comment => {
                    const commentEl = document.createElement('div');
                    commentEl.className = 'flex gap-x-3';
                    commentEl.innerHTML = `
                        <img src="https://picsum.photos/id/1009/32/32" class="w-8 h-8 rounded-full">
                        <div class="flex-1">
                            <div class="bg-[#f0f2f5] px-3 py-2 rounded-2xl">
                                <p class="font-semibold text-sm">Visitante</p>
                                <p class="text-sm">${comment.text}</p>
                            </div>
                        </div>
                    `;
                    list.appendChild(commentEl);
                });
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function addComment() {
            const input = document.getElementById('comment-input');
            if (!input.value.trim() || !currentPostId) return;
            
            const post = posts.find(p => p.id === currentPostId);
            post.comments.push({
                text: input.value.trim(),
                timestamp: new Date().toISOString()
            });
            
            savePosts();
            input.value = '';
            
            // Refresh comments
            closeCommentsModal();
            showComments(currentPostId);
            
            // Re-render posts to update comment count
            renderPosts();
        }

        function closeCommentsModal() {
            const modal = document.getElementById('comments-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function sharePost(postId) {
            const post = posts.find(p => p.id === postId);
            alert(`¡Gracias por compartir la publicación de Don Smaily Chickles!\n\n"${post.text.substring(0, 60)}..."`);
            
            // Simulate share count
            const shareBtn = event.currentTarget;
        }

        function savePosts() {
            localStorage.setItem('blogPosts', JSON.stringify(posts));
        }

        function loadSavedData() {
            // Load bio
            const savedBio = localStorage.getItem('userBio');
            if (savedBio) {
                document.getElementById('bio-text').textContent = savedBio;
            }
            
            // Load posts
            renderPosts();
        }

        // Initialize everything
        function initialize() {
            initializeTailwind();
            loadProfileImages();
            loadSavedData();
            
            // Add some sample posts if empty
            if (posts.length === 0) {
                posts = [
                    {
                        id: 1,
                        text: "¡Como ven ya quedo.",
                        media: "https://i.postimg.cc/gj3KxydB/1000175238.jpg",
                        mediaType: "photo",
                        timestamp: new Date(Date.now() - 86400000).toISOString(),
                        likes: 1942,
                        liked: false,
                        comments: []
                    }
                ];
                savePosts();
                renderPosts();
            }
            
            // Keyboard support for comments
            document.getElementById('comment-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addComment();
                }
            });
            
            console.log('%c[Blog] Perfil de Don Smaily Chickles inicializado correctamente.', 'color:#1877f2');
        }

        // Start the application
        window.onload = initialize;
    </script>
</body>
</html>
