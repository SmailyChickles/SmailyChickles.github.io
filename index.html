<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <title> falcebook</title>
  <style>
  html, body {
	max-width: 820px;
	max-height: 100%;
	min-width: 100%;
	min-height: 100%;
	width: 410px;
	height: auto;
    font-family: 'Segoe UI';
    margin: 0;
    padding: 0px;
    }
    
    header {
	width: 100%;
	height: 50px;
	align-content: center;
	align-items: center;
	justify-content: center;
}

.display {
	width: 96%;
	margin-inline: 2%;
	height: 40px;
	margin-block: 5px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}

h1 {
	word-spacing: -2px;
	letter-spacing: -1px;
}
    .container {
      max-width: 100%;
      margin: 0 auto;
    }
    .composer {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      border: 3px solid #6366f1;
    }
    .composer-header {
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(90deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 15px;
    }
    textarea {
      width: 100%;
      height: 100px;
      border: 2px solid #ddd;
      border-radius: 15px;
      padding: 15px;
      font-size: 16px;
      resize: none;
    }
    .emoji-bar {
      display: flex;
      gap: 8px;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .emoji-btn {
      font-size: 22px;
      background: #f3e8ff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .emoji-btn:hover {
      transform: scale(1.3);
      background: #e0c3fc;
    }
    .media-buttons {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }
    .media-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .photo-btn { background: #22c55e; color: white; 
    	
    }
    .video-btn { background: #f43f5e; color: white; 
    	
    }
    .publish-btn {
      background: linear-gradient(90deg, #6366f1, #ec4899);
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
    }
    .post {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      transition: transform 0.3s;
      cursor: pointer;
    }
    .post:hover {
      transform: translateY(-5px);
    }
    .post-media {
      max-width: 100%;
      border-radius: 15px;
      margin: 15px 0;
    }
    .actions {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    .action-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s;
    }
    .action-btn:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body class="bg-gray-100">
<header class="bg-gray-100 border-b sticky top-0 z-50 shadow-sm">
<div class="display justify-between">
<h1 class="text-[1.5em] text-blue-600 text-bold"><b>falcebook</b></h1>
<i class="fa fa-home text-gray-500 text-[1.6em]"></i>
<i class="fa fa-image text-gray-500 text-[1.4em]"></i>
<i class="fa fa-user-plus text-gray-500 text-[1.4em]"></i>
<i class="fa fa-search text-gray-500 text-[1.4em]"></i>
<i class="fa fa-ellipsis-v text-gray-500 text-[1.4em]"></i></div></header>
<div class="max-w-6xl mx-auto px-2 py-0">
<div class="bg-white rounded-lg shadow mb-4 overflow-hidden">
<div class="relative h-40 bg-gray-200">
<img id="coverImg" src="https://i.postimg.cc/1R24CkQM/7f6f770596eedf0ecd2dfc2e071aa7ec.webp" alt="Portada" class="w-full h-full object-cover">
<label for="coverInput" class="opacity-10 absolute bottom-2 right-2 bg-white p-1 rounded-full shadow cursor-pointer hover:bg-gray-100">
<i class="fa fa-camera text-[1em]"></i>
<input type="file" id="coverInput" accept="image/*" class="hidden"></label></div>
    <!-- Foto de perfil y datos -->
<div class="flex gap-2 mt-0 relative">
<div class="relative -mt-20 ml-2">
<img id="profileImg" src="https://i.postimg.cc/R0S7p8tC/2eede2b88e8de73dd95191e3ffb0a176.webp" alt="Perfil" class="w-40 h-40 rounded-full border-4 border-gray-100 shadow-lg object-cover">
<label for="profileInput" class="absolute bottom-4 right-4 bg-blue-500 p-2 rounded-full cursor-pointer hover:bg-blue-500">
<i class="fa fa-check text-white text-[0.6em]"></i>
<input type="file" id="profileInput" accept="image/*" class="hidden">      </label></div>
<div class="text-center ml-2 mt-2">
<h1 class="text-[1.3em]"><b>Don Smaily Chickles</b></h1>
<p class="text-gray-500 text-[0.8em]"><i class="fa fa-users"></i> 1000m de seguidores</p></div></div>
<div class="border-t border-fb-borde mt-4">
<nav class="flex gap-1 px-4 overflow-x-auto">
<button id="ShowTabs(publicaciones)" class="tab-btn px-6 py-3 font-medium text-fb-azul border-b-2 border-fb-azul" data-tab="publicaciones">Publicaciones</button>
<div id="postsContainer(photos)" class="tab-btn px-6 py-3 font-medium text-gray-600 hover:bg-gray-100 rounded-t" data-tab="fotos">Fotos</div>
<button id="pos(amigos)"class="tab-btn px-6 py-3 font-medium text-gray-600 hover:bg-gray-100 rounded-t" data-tab="amigos">Amigos</button>
      </nav>
    </div>
<div class=""
  <div class="container">
    <!-- COMPOSER -->
    <div class="composer">
      <div class="composer-header">✨ Crear Publicación</div>
      
      <textarea id="postText" placeholder="¿Qué estás pensando hoy?"></textarea>
      
      <!-- Emojis -->
      <div class="emoji-bar">
        <button class="emoji-btn" onclick="addEmoji('😀')">😀</button>
        <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
        <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
        <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="addEmoji('🎉')">🎉</button>
        <button class="emoji-btn" onclick="addEmoji('🌟')">🌟</button>
      </div>

      <!-- Botones de medios -->
      <div class="media-buttons">
        <button class="media-btn photo-btn" onclick="document.getElementById('photoInput').click()">
          📷 Foto
        </button>
        <button class="media-btn video-btn" onclick="document.getElementById('videoInput').click()">
          🎥 Video
        </button>
      </div>

      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewMedia(this)">
      <input type="file" id="videoInput" accept="video/*" style="display:none" onchange="previewMedia(this)">

      <div id="mediaPreview" style="margin:10px 0;"></div>

      <button class="publish-btn" onclick="publicar()">Publicar</button>
    </div>
    <!-- FEED -->
    <div id="feed"></div>
  </div>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDl79CuUCZ7qOLDQ2zaIiB8uetZUbk3qu8",
    authDomain: "webpost-abb13.firebaseapp.com",
    projectId: "webpost-abb13",
    storageBucket: "webpost-abb13.firebasestorage.app",
    messagingSenderId: "284929585574",
    appId: "1:284929585574:web:bf5cbf651fad7072da9f67",
    measurementId: "G-WP4PEE9QF8"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  
    let postId = 0;
    let selectedFile = null;

    function addEmoji(emoji) {
      const textarea = document.getElementById('postText');
      textarea.value += emoji;
      textarea.focus();
    }

    function previewMedia(input) {
      const preview = document.getElementById('mediaPreview');
      preview.innerHTML = '';
      selectedFile = input.files[0];

      if (!selectedFile) return;

      const url = URL.createObjectURL(selectedFile);
      let html = '';

      if (selectedFile.type.startsWith('image')) {
        html = `<img src="${url}" style="max-width:100%; border-radius:15px; max-height:300px;">`;
      } else if (selectedFile.type.startsWith('video')) {
        html = `<video controls style="max-width:100%; border-radius:15px;"><source src="${url}"></video>`;
      }

      preview.innerHTML = html;
    }

    function publicar() {
      const text = document.getElementById('postText').value.trim();
      const preview = document.getElementById('mediaPreview');

      if (!text && !selectedFile) {
        alert("¡Agrega algo de texto o un archivo!");
        return;
      }

      const feed = document.getElementById('feed');
      const post = document.createElement('div');
      post.className = 'post';
      post.id = `post-${postId}`;

      let mediaHTML = '';
      if (selectedFile) {
        const url = URL.createObjectURL(selectedFile);
        if (selectedFile.type.startsWith('image')) {
          mediaHTML = `<img src="${url}" class="post-media">`;
        } else {
          mediaHTML = `<video controls class="post-media"><source src="${url}"></video>`;
        }
      }

      post.innerHTML = `
        <div onclick="efectoPost(${postId})">
          <p><strong>🌟 Usuario</strong></p>
          <p style="font-size:17px; line-height:1.5;">${text}</p>
          ${mediaHTML}
        </div>

        <div class="actions">
          <button class="action-btn" onclick="event.stopImmediatePropagation(); darLike(${postId})">❤️ <span id="like-${postId}">0</span></button>
          <button class="action-btn" onclick="event.stopImmediatePropagation(); mostrarComentarios(${postId})">💬 Comentar</button>
          <button class="action-btn" onclick="event.stopImmediatePropagation(); compartir(${postId})">🔗 Compartir</button>
        </div>

        <div id="comments-${postId}" style="margin-top:15px;"></div>
      `;

      feed.prepend(post);
      
      // Limpiar
      document.getElementById('postText').value = '';
      preview.innerHTML = '';
      selectedFile = null;
      postId++;
    }
    
    // ==================== PESTAÑA DE FOTOS ====================
function showTab(tab) {
  document.getElementById('postsContainer').style.display = tab === 'posts' ? 'block' : 'none';
  document.getElementById('photosSection').style.display = tab === 'photos' ? 'block' : 'none';

  if (tab === 'photos') loadPhotos();
}
    // Efecto creativo al hacer clic en la publicación
    function efectoPost(id) {
      const post = document.getElementById(`post-${id}`);
      post.style.transition = 'all 0.4s';
      post.style.transform = 'scale(1.05)';
      post.style.boxShadow = '0 0 30px #6366f1';

      // Emojis flotantes
      for (let i = 0; i < 8; i++) {
        const emoji = document.createElement('div');
        emoji.textContent = ['❤️','🔥','🌟','🎉'][Math.floor(Math.random()*4)];
        emoji.style.position = 'absolute';
        emoji.style.fontSize = '22px';
        emoji.style.left = Math.random() * 100 + '%';
        emoji.style.top = '50%';
        emoji.style.transition = 'all 1.2s ease-out';
        emoji.style.zIndex = '999';
        post.appendChild(emoji);

        setTimeout(() => {
          emoji.style.transform = `translateY(-${Math.random()*150 + 100}px)`;
          emoji.style.opacity = '0';
        }, 50);

        setTimeout(() => emoji.remove(), 1400);
      }

      setTimeout(() => {
        post.style.transform = 'scale(1)';
        post.style.boxShadow = '0 8px 25px rgba(0,0,0,0.1)';
      }, 600);
    }

    function darLike(id) {
      const span = document.getElementById(`like-${id}`);
      let count = parseInt(span.innerText);
      span.innerText = count + 1;

      // Animación del corazón
      const btn = span.parentElement;
      btn.style.transform = 'scale(1.4)';
      setTimeout(() => btn.style.transform = 'scale(1)', 300);
    }

    function mostrarComentarios(id) {
      const container = document.getElementById(`comments-${id}`);
      if (container.querySelector('input')) return;

      const div = document.createElement('div');
      div.innerHTML = `
        <input type="text" placeholder="Escribe un comentario..." style="width:75%; padding:8px; border-radius:20px; border:1px solid #ccc;">
        <button onclick="agregarComentario(${id}, this)" style="background:#6366f1; color:white; border:none; padding:8px 15px; border-radius:20px;">Enviar</button>
      `;
      container.appendChild(div);
    }

    function agregarComentario(id, btn) {
      const input = btn.parentElement.querySelector('input');
      if (!input.value.trim()) return;

      const container = document.getElementById(`comments-${id}`);
      const comment = document.createElement('div');
      comment.style.cssText = 'background:#f3e8ff; padding:8px 12px; border-radius:15px; margin:8px 0;';
      comment.innerHTML = `<strong>Tú:</strong> ${input.value}`;
      container.appendChild(comment);
      input.value = '';
    }

    function compartir(id) {
      const post = document.getElementById(`post-${id}`);
      post.style.background = 'linear-gradient(90deg, #fefce8, #fef08c)';
      setTimeout(() => {
        post.style.background = 'white';
        alert('✅ ¡Publicación compartida con éxito!');
      }, 800);
    }
</script>
</body>
</html>
