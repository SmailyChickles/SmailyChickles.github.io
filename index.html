<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1.0, max-width-scale=1.0, max-height-scale=1.0, user-scalable=no">
<meta http-equiv="content-type" content="text/css">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>falcebook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Roboto:wght@400;500&amp;display=swap');

html, body {
	max-width: 820px;
	max-height: 100%;
	min-width: 100%;
	min-height: 100%;
	width: 410px;
	height: auto;
	background-color: #fff;
	color: #121212;
	margin: 0px;
	padding: 0px;
}

header {
	width: 100%;
	height: 40px;
	align-content: center;
	justify-content: center;
	margin: 0px;
	padding: 0px;
}

.display {
	width: 90%;
	height: 30px;
	display: flex;
	margin-block: 5px;
	margin-inline: 5%;
	align-items: center;
	align-content: center;
	justify-content: space-between;
}

.sef {
	color: #731516;
}

hr {
	width: 100%;
	height: 5px;
	color: #ccc;
	background-color: #ccc;
	border: 5px solid #ccc;
	margin-top: 0px;
}

.cabexa {
	width: 100%;
	height: 340px;
	background-color: #fff;
	color: #121212;
	margin: 0px;
	padding: 0px;
	border-block: 5px solid #ccc;
}

.w28 {
	width: 100%;
	height: 150px;
	margin: 0px;
	padding: 0px;
	display: flex;
	text-justify: space-between;
}

.columna-1 {
	width: 35%;
	height: 149px;
	
}

.mer {
	width: 250px;
	height: 100px;
	align-content: center;
	justify-content: center;
}

h1 {
	word-spacing: -1px;
	letter-spacing: -1px;
}

.conta {
	width: 100%;
	height: 40px;
	margin-top: -20px;
	align-items: center;
	justify-content: space-between;
	background-color: #121212;
	color: #fff;
	display: flex;
}
</style>
</head>
<body>
<header class="bg-white border-b sticky top-0 z-50 shadow-sm">
	<div class="display">
	<h1 class="text-[1.3em] text-[#106BDF] text-bold"><b>falcebook</b></h1>
	<i class="sef fa-solid fa-house"></i>
	<i class="sef fa-solid fa-image"></i>
	<i class="sef fa-solid fa-User"></i>
	<i class="sef fa-solid fa-search"></i>
	</div>
</header>
<div class="cabexa">
	<div class="bg-gray-100 shadow overflow-hidden">
	<div class="relative h-40 bg-gradient-to-r from-red-800 to-orange-500">
		<img id="cover-photo" src='https://i.postimg.cc/1R24CkQM/7f6f770596eedf0ecd2dfc2e071aa7ec.webp' class="w-full h-full object-cover" alt="foto de portada">
		<label class="opacity-20 absolute bottom-2 right-1 bg-white px-1 py-1 rounded-lg shadow flex items-center gap-0 cursor-pointer hover:bg-gray-100 text-sm font-medium">
		<i class="fa-solid fa-camera"></i>
		<input type="file" id="cover-input" accept="image/*" class="hidden" onchange="changeCoverPhoto(this)"></label>
		</div>
		</div>
<div class="w28">
	<div class="relative -mt-8 ml-2">
	<div class="w-36 h-36 border-4 border-white rounded-full overflow-hidden shadow-lg">
		<img id="profile-pic" src='https://i.postimg.cc/R0S7p8tC/2eede2b88e8de73dd95191e3ffb0a176.webp' class="w-full h-full object-cover profile-pic cursor-pointer" alt="profile pic" onclick="document.getElementById('profile-input').click()">
		<i class="fa-solid fa-check text-[#106BDF]"></i>
	</div>
	</div>
<div class="mer ml-1">
	<h1 class="text-[1.25em] text-[#121212] text-bold text-center"><b>Don Smaily Chickles</b></h1>
	<p class="text-[0.8em] text-gray-600 text-semibold text-center"><i class=" fa-solid fa-users"></i>1000m de seguidores</p>
</div></div>
<div class="conta">
<h1 class="text-[1em] ml-2"><b>PERFIL</b></h1>
<h1 class="text-[1em]"><b>FOTOS</b></h1>
<h1 class="text-[1em]"><b>AMIGOS</b></h1>
<h1 class="text-[1em] mr-2"><b>INFO</b></h1>
</div>
<!-- Crear publicación -->
<div class="bg-white rounded-lg shadow mt-4 p-4">
<div class="flex gap-3">
<img id="composer-profile-pic" src="https://i.postimg.cc/R0S7p8tC/2eede2b88e8de73dd95191e3ffb0a176.webp" class="w-12 h-12 rounded-full object-cover" alt="">
<div class="flex-1">
<div onclick="showCreatePostModal()" class="w-full bg-[#f0f2f5] hover:bg-[#e4e6ea] px-4 py-3 rounded-full text-[#121212] cursor-pointer">
¡Publique sus mamadas aqui!</div></div></div>
<div class="border-t mt-3 pt-3 flex justify-around text-sm">
<button onclick="showCreatePostModal('photo')" class="flex items-center gap-2 px-4 py-2 hover:bg-[#f0f2f5] rounded-lg text-[#65676b]">
<i class="fa-solid fa-image text-green-500"></i>
<span class="font-medium">Foto</span>
</button>
<button onclick="showCreatePostModal('video')" class="flex items-center gap-2 px-4 py-2 hover:bg-[#f0f2f5] rounded-lg text-[#65676b]">
<i class="fa-solid fa-video text-red-500"></i>
<span class="font-medium">Video</span></button></div></div>
<!-- Publicaciones -->
<div id="posts-container" class="mt-4 space-y-4">
<!-- Las publicaciones se agregan aquí con JavaScript -->
</div></div>
<!-- Modal para crear publicación -->
<div id="create-post-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
<div class="bg-white w-full max-w-lg rounded-xl overflow-hidden">
<div class="px-4 py-3 border-b flex justify-between items-center">
<h3 class="font-semibold text-lg">Crear publicación</h3>
<button onclick="hideCreatePostModal()" class="text-2xl leading-none">&times;</button></div>
<div class="p-4">
<div class="flex gap-3 mb-4">
<img id="modal-profile-pic" src="https://i.postimg.cc/R0S7p8tC/2eede2b88e8de73dd95191e3ffb0a176.webp" class="w-10 h-10 rounded-full">
<div>
<div class="font-semibold">Don Smaily Chickles</div></div></div>
<textarea id="post-text" rows="4" class="w-full border-none focus:ring-0 resize-none text-lg" placeholder="¡Publique sus mamadas aquí!"></textarea>
<div id="media-preview" class="hidden mt-3 rounded-lg overflow-hidden border"></div>
            </div>
            
            <div class="px-4 py-3 border-t flex justify-between items-center">
                <div class="flex gap-2">
                    <button onclick="addMediaToPost('photo')" class="px-3 py-2 hover:bg-[#f0f2f5] rounded-lg flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-image text-green-500"></i>
                        <span>Foto</span>
                    </button>
                    <button onclick="addMediaToPost('video')" class="px-3 py-2 hover:bg-[#f0f2f5] rounded-lg flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-video text-red-500"></i>
                        <span>Video</span>
                    </button>
                </div>
                
                <button onclick="publishPost()" 
                        class="bg-[#1877f2] text-white px-6 py-2 rounded-lg font-semibold hover:bg-[#166fe0]">
Publicar</button></div></div></div>
<script>
        // Datos iniciales
        let posts = [
            {
            }
        ];

        // Renderizar publicaciones
        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const postHTML = `
                    <div class="bg-white rounded-lg shadow post">
                        <!-- Encabezado del post -->
                        <div class="flex items-center gap-3 p-4">
                            <img src="https://i.postimg.cc/R0S7p8tC/2eede2b88e8de73dd95191e3ffb0a176.webp" class="w-10 h-10 rounded-full">
                            <div>
                                <div class="font-semibold">Don Smaily Chickles</div>
                                <div class="text-xs text-[#65676b]">Hace unos minutos • 🌍</div>
                            </div>
                        </div>
                        
                        <!-- Contenido -->
                        <div class="px-4 pb-3">
                            <p class="text-[15px]">${post.text}</p>
                            
                            ${post.media ? `
                                <div class="mt-3 rounded-lg overflow-hidden">
                                    ${post.type === 'photo' ? 
                                        `<img src="${post.media}" class="w-full max-h-[400px] object-cover">` : 
                                        `<video controls class="w-full"><source src="${post.media}" type="video/mp4"></video>`
                                    }
                                </div>` : ''}
                        </div>
                        
                        <!-- Interacciones -->
                        <div class="px-4 py-2 border-t flex items-center justify-between text-sm text-[#65676b]">
                            <div class="flex items-center gap-1">
                                <span class="like-count">${post.likes}</span> Me gusta
                            </div>
                            <div>${post.comments.length} comentarios</div>
                        </div>
                        
                        <!-- Botones de acción -->
                        <div class="flex border-t text-sm font-medium">
                            <button onclick="likePost(${post.id}, this)" 
                                    class="flex-1 py-2 flex items-center justify-center gap-2 hover:bg-[#f0f2f5] ${post.liked ? 'text-[#1877f2]' : 'text-[#65676b]'}">
                                <i class="fa-solid fa-thumbs-up"></i>
                                <span>Me gusta</span>
                            </button>
                            
                            <button onclick="showCommentInput(${post.id}, this)" 
                                    class="flex-1 py-2 flex items-center justify-center gap-2 hover:bg-[#f0f2f5] text-[#65676b]">
                                <i class="fa-solid fa-comment"></i>
                                <span>Comentar</span>
                            </button>
                        </div>
                        
                        <!-- Comentarios -->
                        <div class="px-4 py-2 border-t bg-[#f7f8fa]">
                            ${post.comments.map(comment => `
                                <div class="flex gap-2 mb-2">
                                    <div class="w-8 h-8 bg-gray-300 rounded-full flex-shrink-0"></div>
                                    <div class="bg-white px-3 py-2 rounded-2xl text-sm flex-1">
                                        <span class="font-semibold">${comment.user}</span><br>
                                        ${comment.text}
                                    </div>
                                </div>
                            `).join('')}
                            
                            <div id="comment-input-${post.id}" class="hidden mt-2 flex gap-2">
                                <input type="text" id="comment-text-${post.id}" 
                                       class="flex-1 bg-white border rounded-full px-4 py-2 text-sm" 
                                       placeholder="Escribe un comentario...">
                                <button onclick="addComment(${post.id})" 
                                        class="bg-[#1877f2] text-white px-4 rounded-full text-sm font-medium">
                                    Enviar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += postHTML;
            });
        }

        // Dar like
        function likePost(postId, element) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;
            
            // Actualizar UI
            const likeCount = element.parentElement.parentElement.querySelector('.like-count');
            likeCount.textContent = post.likes;
            
            if (post.liked) {
                element.classList.add('text-[#1877f2]');
            } else {
                element.classList.remove('text-[#1877f2]');
            }
        }

        // Mostrar input de comentario
        function showCommentInput(postId, element) {
            const inputContainer = document.getElementById(`comment-input-${postId}`);
            inputContainer.classList.toggle('hidden');
            
            if (!inputContainer.classList.contains('hidden')) {
                document.getElementById(`comment-text-${postId}`).focus();
            }
        }

        // Agregar comentario
        function addComment(postId) {
            const input = document.getElementById(`comment-text-${postId}`);
            if (!input.value.trim()) return;
            
            const post = posts.find(p => p.id === postId);
            post.comments.push({
                user: "Visitante",
                text: input.value.trim()
            });
            
            input.value = '';
            renderPosts();
        }

        // Cambiar foto de perfil
        function changeProfilePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profile-pic').src = e.target.result;
                    document.getElementById('composer-profile-pic').src = e.target.result;
                    document.getElementById('modal-profile-pic').src = e.target.result;
                    document.getElementById('nav-profile-pic').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Cambiar foto de portada
        function changeCoverPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('cover-photo').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Modal de crear publicación
        let currentMediaType = null;
        let currentMediaData = null;

        function showCreatePostModal(type = null) {
            const modal = document.getElementById('create-post-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.getElementById('post-text').value = '';
            document.getElementById('media-preview').classList.add('hidden');
            currentMediaType = type;
            currentMediaData = null;
            
            if (type) {
                // Simular selección de archivo
                setTimeout(() => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = type === 'photo' ? 'image/*' : 'video/*';
                    input.onchange = function() {
                        if (input.files[0]) {
                            const reader = new FileReader();
                            reader.onload = function(ev) {
                                currentMediaData = ev.target.result;
                                showMediaPreview(type, currentMediaData);
                            };
                            reader.readAsDataURL(input.files[0]);
                        }
                    };
                    input.click();
                }, 300);
            }
        }

        function showMediaPreview(type, data) {
            const preview = document.getElementById('media-preview');
            preview.innerHTML = '';
            preview.classList.remove('hidden');
            
            if (type === 'photo') {
                preview.innerHTML = `<img src="${data}" class="w-full max-h-64 object-cover">`;
            } else {
                preview.innerHTML = `<video controls class="w-full"><source src="${data}"></video>`;
            }
        }

        function addMediaToPost(type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = type === 'photo' ? 'image/*' : 'video/*';
            input.onchange = function() {
                if (input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        currentMediaType = type;
                        currentMediaData = ev.target.result;
                        showMediaPreview(type, currentMediaData);
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            };
            input.click();
        }

        function hideCreatePostModal() {
            const modal = document.getElementById('create-post-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function publishPost() {
            const text = document.getElementById('post-text').value.trim();
            if (!text && !currentMediaData) {
                alert('Escribe algo o agrega una foto/video');
                return;
            }
            
            const newPost = {
                id: Date.now(),
                text: text || '',
                type: currentMediaType || 'text',
                media: currentMediaData,
                likes: 0,
                liked: false,
                comments: []
            };
            
            posts.unshift(newPost);
            renderPosts();
            hideCreatePostModal();
            
            // Reset
            currentMediaType = null;
            currentMediaData = null;
        }

        function editProfile() {
            const name = prompt('Ingresa tu nombre:', 'Tu Nombre');
            if (name) {
                document.querySelector('h1').textContent = name;
            }
        }

        // Inicializar
        function init() {
            // Actualizar fotos de perfil en el modal
            const profilePic = document.getElementById('profile-pic').src;
            document.getElementById('composer-profile-pic').src = profilePic;
            document.getElementById('modal-profile-pic').src = profilePic;
            
            renderPosts();
            
            // Atajo de teclado
            document.addEventListener('keydown', function(e) {
                if (e.key === "Escape") {
                    const modal = document.getElementById('create-post-modal');
                    if (!modal.classList.contains('hidden')) {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                    }
                }
            });
        }

        window.onload = init;
    </script>
</div>
</body>
</html>
